api_version = "1"
name = "project_planning"
kind = "agent_profile"
version = "0.1.0"
entrypoint = "plugin.py:plugin"
description = "Opinionated architecture-planning plugin: architect + 5 critic personas, multi-stage planning flows, and gates for autonomous project decomposition."

[[capabilities]]
kind = "agent_profile"
name = "architect"
requires_api = ">=1,<2"

[[capabilities]]
kind = "agent_profile"
name = "critic_simplicity"
requires_api = ">=1,<2"

[[capabilities]]
kind = "agent_profile"
name = "critic_maintainability"
requires_api = ">=1,<2"

[[capabilities]]
kind = "agent_profile"
name = "critic_user"
requires_api = ">=1,<2"

[[capabilities]]
kind = "agent_profile"
name = "critic_operational"
requires_api = ">=1,<2"

[[capabilities]]
kind = "agent_profile"
name = "critic_security"
requires_api = ">=1,<2"

[content]
kinds = ["flow_template", "gate"]
user_paths = ["flows", "gates"]
